services:
  pz-arm64:
    build:
      context: .
      dockerfile: Dockerfile
    image: projectzomboid-arm64:latest
    container_name: pz-server
    restart: unless-stopped
    environment:
      # =========================================================================
      # All env vars from .env.example are passed to container with defaults.
      # No .env file required — everything works with sensible defaults.
      # =========================================================================

      # ===== [User] File Ownership =====
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

      # ===== [Memory] JVM Heap =====
      - MEMORY_XMX_GB=${MEMORY_XMX_GB:-8}
      - MEMORY_XMS_GB=${MEMORY_XMS_GB:-}
      - MEMORY=${MEMORY:-2G}

      # ===== [Important] Credentials =====
      - PASSWORD=${PASSWORD:-CHANGEME}
      - RCON_PASSWORD=${RCON_PASSWORD:-changeme}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}

      # ===== [Mod] Workshop =====
      - MODS=${MODS:-}
      - WORKSHOP_ITEMS=${WORKSHOP_ITEMS:-}

      # ===== [Server] Identity =====
      - SERVER_NAME=${SERVER_NAME:-pzserver}
      - SERVER_BROWSER_ANNOUNCED_IP=${SERVER_BROWSER_ANNOUNCED_IP:-}
      - SERVER_WELCOME_MESSAGE=${SERVER_WELCOME_MESSAGE:-Welcome to your Project Zomboid Docker server}
      # SERVER_PUBLIC is compose-safe primary (avoids Windows %PUBLIC% env var collision).
      # PUBLIC is kept as backwards-compatible alias for direct Docker run / script use.
      - SERVER_PUBLIC=${SERVER_PUBLIC:-true}
      - PUBLIC_NAME=${PUBLIC_NAME:-Project Zomboid Server}
      - PUBLIC_DESCRIPTION=${PUBLIC_DESCRIPTION:-Welcome to your Project Zomboid Docker server}
      - SERVER_PLAYER_ID=${SERVER_PLAYER_ID:-88635698}
      - RESET_ID=${RESET_ID:-563979383}
      - MAX_PLAYERS=${MAX_PLAYERS:-32}

      # ===== [Server] Network =====
      - DEFAULT_PORT=${DEFAULT_PORT:-16261}
      - UDP_PORT=${UDP_PORT:-16262}
      - RCON_PORT=${RCON_PORT:-27015}
      - PING_LIMIT=${PING_LIMIT:-400}

      # ===== [Server] Gameplay Toggles =====
      - PVP=${PVP:-true}
      - PAUSE_EMPTY=${PAUSE_EMPTY:-true}
      - GLOBAL_CHAT=${GLOBAL_CHAT:-true}
      - OPEN=${OPEN:-true}
      - SAFETY_SYSTEM=${SAFETY_SYSTEM:-true}
      - SHOW_SAFETY=${SHOW_SAFETY:-true}
      - SAFETY_TOGGLE_TIMER=${SAFETY_TOGGLE_TIMER:-2}
      - SAFETY_COOLDOWN_TIMER=${SAFETY_COOLDOWN_TIMER:-3}
      - DO_LUA_CHECKSUM=${DO_LUA_CHECKSUM:-true}
      - DENY_LOGIN_ON_OVERLOADED_SERVER=${DENY_LOGIN_ON_OVERLOADED_SERVER:-false}
      - NO_FIRE=${NO_FIRE:-false}
      - ANNOUNCE_DEATH=${ANNOUNCE_DEATH:-false}
      - ALLOW_DESTRUCTION_BY_SLEDGEHAMMER=${ALLOW_DESTRUCTION_BY_SLEDGEHAMMER:-true}
      - SLEDGEHAMMER_ONLY_IN_SAFEHOUSE=${SLEDGEHAMMER_ONLY_IN_SAFEHOUSE:-false}
      - KICK_FAST_PLAYERS=${KICK_FAST_PLAYERS:-false}
      - ALLOW_COOP=${ALLOW_COOP:-true}
      - SLEEP_ALLOWED=${SLEEP_ALLOWED:-false}
      - SLEEP_NEEDED=${SLEEP_NEEDED:-false}
      - KNOCKED_DOWN_ALLOWED=${KNOCKED_DOWN_ALLOWED:-true}
      - SNEAK_MODE_HIDE_FROM_OTHER_PLAYERS=${SNEAK_MODE_HIDE_FROM_OTHER_PLAYERS:-true}
      - STEAM_SCOREBOARD=${STEAM_SCOREBOARD:-true}
      - STEAM_VAC=${STEAM_VAC:-true}
      - UPNP=${UPNP:-true}
      - VOICE_ENABLE=${VOICE_ENABLE:-true}
      - VOICE_3D=${VOICE_3D:-true}
      - FACTION=${FACTION:-true}
      - DISABLE_RADIO_STAFF=${DISABLE_RADIO_STAFF:-false}
      - DISABLE_RADIO_ADMIN=${DISABLE_RADIO_ADMIN:-false}
      - DISABLE_RADIO_GM=${DISABLE_RADIO_GM:-false}
      - DISABLE_RADIO_OVERSEER=${DISABLE_RADIO_OVERSEER:-false}
      - DISABLE_RADIO_MODERATOR=${DISABLE_RADIO_MODERATOR:-false}
      - DISABLE_RADIO_INVISIBLE=${DISABLE_RADIO_INVISIBLE:-false}
      - ALLOW_NON_ASCII_USERNAME=${ALLOW_NON_ASCII_USERNAME:-false}
      - BAN_KICK_GLOBAL_SOUND=${BAN_KICK_GLOBAL_SOUND:-true}
      - REMOVE_PLAYER_CORPSES_ON_CORPSE_REMOVAL=${REMOVE_PLAYER_CORPSES_ON_CORPSE_REMOVAL:-false}
      - TRASH_DELETE_ALL=${TRASH_DELETE_ALL:-false}
      - PVP_MELEE_WHILE_HIT_REACTION=${PVP_MELEE_WHILE_HIT_REACTION:-false}
      - MOUSE_OVER_TO_SEE_DISPLAY_NAME=${MOUSE_OVER_TO_SEE_DISPLAY_NAME:-true}
      - HIDE_PLAYERS_BEHIND_YOU=${HIDE_PLAYERS_BEHIND_YOU:-true}
      - PLAYER_BUMP_PLAYER=${PLAYER_BUMP_PLAYER:-false}
      - LOGIN_QUEUE_ENABLED=${LOGIN_QUEUE_ENABLED:-false}
      - PLAYER_RESPAWN_WITH_SELF=${PLAYER_RESPAWN_WITH_SELF:-false}
      - PLAYER_RESPAWN_WITH_OTHER=${PLAYER_RESPAWN_WITH_OTHER:-false}
      - DISABLE_SAFEHOUSE_WHEN_PLAYER_CONNECTED=${DISABLE_SAFEHOUSE_WHEN_PLAYER_CONNECTED:-false}
      - AUTO_CREATE_USER_IN_WHITE_LIST=${AUTO_CREATE_USER_IN_WHITE_LIST:-false}
      - DISPLAY_USER_NAME=${DISPLAY_USER_NAME:-true}
      - SHOW_FIRST_AND_LAST_NAME=${SHOW_FIRST_AND_LAST_NAME:-false}

      # ===== [Server] Numeric Tuning =====
      - HOURS_FOR_LOOT_RESPAWN=${HOURS_FOR_LOOT_RESPAWN:-0}
      - MAX_ITEMS_FOR_LOOT_RESPAWN=${MAX_ITEMS_FOR_LOOT_RESPAWN:-4}
      - CONSTRUCTION_PREVENTS_LOOT_RESPAWN=${CONSTRUCTION_PREVENTS_LOOT_RESPAWN:-false}
      - DROP_OFF_WHITE_LIST_AFTER_DEATH=${DROP_OFF_WHITE_LIST_AFTER_DEATH:-false}
      - MINUTES_PER_PAGE=${MINUTES_PER_PAGE:-1.0}
      - SAVE_WORLD_EVERY_MINUTES=${SAVE_WORLD_EVERY_MINUTES:-0}
      - VOICE_MIN_DISTANCE=${VOICE_MIN_DISTANCE:-10.0}
      - VOICE_MAX_DISTANCE=${VOICE_MAX_DISTANCE:-100.0}
      - SPEED_LIMIT=${SPEED_LIMIT:-70.0}
      - FAST_FORWARD_MULTIPLIER=${FAST_FORWARD_MULTIPLIER:-40.0}
      - LOGIN_QUEUE_CONNECT_TIMEOUT=${LOGIN_QUEUE_CONNECT_TIMEOUT:-60}
      - PVP_MELEE_DAMAGE_MODIFIER=${PVP_MELEE_DAMAGE_MODIFIER:-30.0}
      - PVP_FIREARM_DAMAGE_MODIFIER=${PVP_FIREARM_DAMAGE_MODIFIER:-50.0}
      - CAR_ENGINE_ATTRACTION_MODIFIER=${CAR_ENGINE_ATTRACTION_MODIFIER:-0.5}
      - MAP_REMOTE_PLAYER_VISIBILITY=${MAP_REMOTE_PLAYER_VISIBILITY:-1}
      - ITEM_NUMBERS_LIMIT_PER_CONTAINER=${ITEM_NUMBERS_LIMIT_PER_CONTAINER:-0}
      - BLOOD_SPLAT_LIFESPAN_DAYS=${BLOOD_SPLAT_LIFESPAN_DAYS:-0}
      - BACKUPS_COUNT=${BACKUPS_COUNT:-5}
      - BACKUPS_PERIOD=${BACKUPS_PERIOD:-0}
      - BACKUPS_ON_START=${BACKUPS_ON_START:-true}
      - BACKUPS_ON_VERSION_CHANGE=${BACKUPS_ON_VERSION_CHANGE:-true}
      - MAX_ACCOUNTS_PER_USER=${MAX_ACCOUNTS_PER_USER:-0}

      # ===== [Server] Safehouse =====
      - PLAYER_SAFEHOUSE=${PLAYER_SAFEHOUSE:-false}
      - ADMIN_SAFEHOUSE=${ADMIN_SAFEHOUSE:-false}
      - SAFEHOUSE_ALLOW_TRESPASS=${SAFEHOUSE_ALLOW_TRESPASS:-true}
      - SAFEHOUSE_ALLOW_FIRE=${SAFEHOUSE_ALLOW_FIRE:-true}
      - SAFEHOUSE_ALLOW_LOOT=${SAFEHOUSE_ALLOW_LOOT:-true}
      - SAFEHOUSE_ALLOW_RESPAWN=${SAFEHOUSE_ALLOW_RESPAWN:-false}
      - SAFEHOUSE_DAY_SURVIVED_TO_CLAIM=${SAFEHOUSE_DAY_SURVIVED_TO_CLAIM:-0}
      - SAFEHOUSE_REMOVAL_TIME=${SAFEHOUSE_REMOVAL_TIME:-144}
      - SAFEHOUSE_ALLOW_NON_RESIDENTIAL=${SAFEHOUSE_ALLOW_NON_RESIDENTIAL:-false}

      # ===== [Server] Factions =====
      - FACTION_DAY_SURVIVED_TO_CREATE=${FACTION_DAY_SURVIVED_TO_CREATE:-0}
      - FACTION_PLAYERS_REQUIRED_FOR_TAG=${FACTION_PLAYERS_REQUIRED_FOR_TAG:-1}

      # ===== [Server] Discord =====
      - DISCORD_ENABLE=${DISCORD_ENABLE:-false}
      - DISCORD_TOKEN=${DISCORD_TOKEN:-}
      - DISCORD_CHANNEL=${DISCORD_CHANNEL:-}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID:-}

      # ===== [Server] Chat / Logs =====
      - CHAT_STREAMS=${CHAT_STREAMS:-s,r,a,w,y,sh,f,all}
      - CLIENT_COMMAND_FILTER=${CLIENT_COMMAND_FILTER:--vehicle.*;+vehicle.damageWindow;+vehicle.fixPart;+vehicle.installPart;+vehicle.uninstallPart}
      - CLIENT_ACTION_LOGS=${CLIENT_ACTION_LOGS:-ISEnterVehicle;ISExitVehicle;ISTakeEngineParts;}
      - PERK_LOGS=${PERK_LOGS:-true}

      # ===== [Server] Spawn =====
      - SPAWN_POINT=${SPAWN_POINT:-0,0,0}
      - SPAWN_ITEMS=${SPAWN_ITEMS:-}
      - MAP=${MAP:-}

      # ===== [Anti-Cheat] Type Toggles (1-24) =====
      - ANTI_CHEAT_PROTECTION_TYPE1=${ANTI_CHEAT_PROTECTION_TYPE1:-true}
      - ANTI_CHEAT_PROTECTION_TYPE2=${ANTI_CHEAT_PROTECTION_TYPE2:-true}
      - ANTI_CHEAT_PROTECTION_TYPE3=${ANTI_CHEAT_PROTECTION_TYPE3:-true}
      - ANTI_CHEAT_PROTECTION_TYPE4=${ANTI_CHEAT_PROTECTION_TYPE4:-true}
      - ANTI_CHEAT_PROTECTION_TYPE5=${ANTI_CHEAT_PROTECTION_TYPE5:-true}
      - ANTI_CHEAT_PROTECTION_TYPE6=${ANTI_CHEAT_PROTECTION_TYPE6:-true}
      - ANTI_CHEAT_PROTECTION_TYPE7=${ANTI_CHEAT_PROTECTION_TYPE7:-true}
      - ANTI_CHEAT_PROTECTION_TYPE8=${ANTI_CHEAT_PROTECTION_TYPE8:-true}
      - ANTI_CHEAT_PROTECTION_TYPE9=${ANTI_CHEAT_PROTECTION_TYPE9:-true}
      - ANTI_CHEAT_PROTECTION_TYPE10=${ANTI_CHEAT_PROTECTION_TYPE10:-true}
      - ANTI_CHEAT_PROTECTION_TYPE11=${ANTI_CHEAT_PROTECTION_TYPE11:-true}
      - ANTI_CHEAT_PROTECTION_TYPE12=${ANTI_CHEAT_PROTECTION_TYPE12:-true}
      - ANTI_CHEAT_PROTECTION_TYPE13=${ANTI_CHEAT_PROTECTION_TYPE13:-true}
      - ANTI_CHEAT_PROTECTION_TYPE14=${ANTI_CHEAT_PROTECTION_TYPE14:-true}
      - ANTI_CHEAT_PROTECTION_TYPE15=${ANTI_CHEAT_PROTECTION_TYPE15:-true}
      - ANTI_CHEAT_PROTECTION_TYPE16=${ANTI_CHEAT_PROTECTION_TYPE16:-true}
      - ANTI_CHEAT_PROTECTION_TYPE17=${ANTI_CHEAT_PROTECTION_TYPE17:-true}
      - ANTI_CHEAT_PROTECTION_TYPE18=${ANTI_CHEAT_PROTECTION_TYPE18:-true}
      - ANTI_CHEAT_PROTECTION_TYPE19=${ANTI_CHEAT_PROTECTION_TYPE19:-true}
      - ANTI_CHEAT_PROTECTION_TYPE20=${ANTI_CHEAT_PROTECTION_TYPE20:-true}
      - ANTI_CHEAT_PROTECTION_TYPE21=${ANTI_CHEAT_PROTECTION_TYPE21:-true}
      - ANTI_CHEAT_PROTECTION_TYPE22=${ANTI_CHEAT_PROTECTION_TYPE22:-true}
      - ANTI_CHEAT_PROTECTION_TYPE23=${ANTI_CHEAT_PROTECTION_TYPE23:-true}
      - ANTI_CHEAT_PROTECTION_TYPE24=${ANTI_CHEAT_PROTECTION_TYPE24:-true}

      # ===== [Anti-Cheat] Threshold Multipliers =====
      # Supports both _THRESHOLD_MULTIPLIER (upstream) and _THRESHOLD (alias)
      - ANTI_CHEAT_PROTECTION_TYPE2_THRESHOLD_MULTIPLIER=${ANTI_CHEAT_PROTECTION_TYPE2_THRESHOLD_MULTIPLIER:-3.0}
      - ANTI_CHEAT_PROTECTION_TYPE3_THRESHOLD_MULTIPLIER=${ANTI_CHEAT_PROTECTION_TYPE3_THRESHOLD_MULTIPLIER:-1.0}
      - ANTI_CHEAT_PROTECTION_TYPE4_THRESHOLD_MULTIPLIER=${ANTI_CHEAT_PROTECTION_TYPE4_THRESHOLD_MULTIPLIER:-1.0}
      - ANTI_CHEAT_PROTECTION_TYPE9_THRESHOLD_MULTIPLIER=${ANTI_CHEAT_PROTECTION_TYPE9_THRESHOLD_MULTIPLIER:-1.0}
      - ANTI_CHEAT_PROTECTION_TYPE15_THRESHOLD_MULTIPLIER=${ANTI_CHEAT_PROTECTION_TYPE15_THRESHOLD_MULTIPLIER:-1.0}
      - ANTI_CHEAT_PROTECTION_TYPE20_THRESHOLD_MULTIPLIER=${ANTI_CHEAT_PROTECTION_TYPE20_THRESHOLD_MULTIPLIER:-1.0}
      - ANTI_CHEAT_PROTECTION_TYPE22_THRESHOLD_MULTIPLIER=${ANTI_CHEAT_PROTECTION_TYPE22_THRESHOLD_MULTIPLIER:-1.0}
      - ANTI_CHEAT_PROTECTION_TYPE24_THRESHOLD_MULTIPLIER=${ANTI_CHEAT_PROTECTION_TYPE24_THRESHOLD_MULTIPLIER:-6.0}
      # _THRESHOLD aliases (shorter synonyms for _THRESHOLD_MULTIPLIER)
      - ANTI_CHEAT_PROTECTION_TYPE2_THRESHOLD=${ANTI_CHEAT_PROTECTION_TYPE2_THRESHOLD:-3.0}
      - ANTI_CHEAT_PROTECTION_TYPE3_THRESHOLD=${ANTI_CHEAT_PROTECTION_TYPE3_THRESHOLD:-1.0}
      - ANTI_CHEAT_PROTECTION_TYPE4_THRESHOLD=${ANTI_CHEAT_PROTECTION_TYPE4_THRESHOLD:-1.0}
      - ANTI_CHEAT_PROTECTION_TYPE9_THRESHOLD=${ANTI_CHEAT_PROTECTION_TYPE9_THRESHOLD:-1.0}
      - ANTI_CHEAT_PROTECTION_TYPE15_THRESHOLD=${ANTI_CHEAT_PROTECTION_TYPE15_THRESHOLD:-1.0}
      - ANTI_CHEAT_PROTECTION_TYPE20_THRESHOLD=${ANTI_CHEAT_PROTECTION_TYPE20_THRESHOLD:-1.0}
      - ANTI_CHEAT_PROTECTION_TYPE22_THRESHOLD=${ANTI_CHEAT_PROTECTION_TYPE22_THRESHOLD:-1.0}
      - ANTI_CHEAT_PROTECTION_TYPE24_THRESHOLD=${ANTI_CHEAT_PROTECTION_TYPE24_THRESHOLD:-6.0}

      # ===== [ARM] Extras =====
      - BRANCH=${BRANCH:-}
      - SERVER_BRANCH=${SERVER_BRANCH:-}
      - UPDATE_ON_START=${UPDATE_ON_START:-true}
      - DISABLE_STEAM=${DISABLE_STEAM:-false}
      - GENERATE_SETTINGS=${GENERATE_SETTINGS:-true}
      - USE_JAVA_FALLBACK=${USE_JAVA_FALLBACK:-false}
      - JAVA_EXTRA_ARGS=${JAVA_EXTRA_ARGS:-}
      - ARM64_DEVICE=${ARM64_DEVICE:-}
      # Box64 tuning
      - BOX64_DYNAREC_BIGBLOCK=${BOX64_DYNAREC_BIGBLOCK:-1}
      - BOX64_DYNAREC_BLEEDING_EDGE=${BOX64_DYNAREC_BLEEDING_EDGE:-0}
      - BOX64_DYNAREC_BB_LOOP=${BOX64_DYNAREC_BB_LOOP:-1}
      - BOX64_DYNAREC_FORWARD=${BOX64_DYNAREC_FORWARD:-1}
      - BOX64_DYNAREC_STRONGMEM=${BOX64_DYNAREC_STRONGMEM:-1}
    ports:
      # Game traffic
      - "8766:8766/udp"
      - "8767:8767/udp"
      # Steam query / master server
      - "16261:16261/udp"
      - "16262:16262/udp"
      # RCON
      - "${RCON_PORT:-27015}:${RCON_PORT:-27015}/tcp"
    volumes:
      # Server saves, mods, logs
      - pz-data:/project-zomboid
      # Server config (ProjectZomboid64.json, server INIs)
      - pz-config:/project-zomboid-config
      # SteamCMD cache (optional — speeds up repeated builds)
      - pz-steamapps:/steamapps
    stop_grace_period: 90s

volumes:
  pz-data:
    driver: local
  pz-config:
    driver: local
  pz-steamapps:
    driver: local
