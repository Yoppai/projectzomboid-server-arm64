services:
  pz-arm64:
    build:
      context: .
      dockerfile: Dockerfile
    image: projectzomboid-arm64:latest
    container_name: pz-server
    restart: unless-stopped
    environment:
      # =========================================================================
      # Essential vars for first deploy — everything else has sensible defaults.
      # =========================================================================

      # ===== [User] File Ownership =====
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

      # ===== [Memory] JVM Heap =====
      - MEMORY_XMX_GB=${MEMORY_XMX_GB:-2}

      # ===== [Credentials] =====
      - PASSWORD=${PASSWORD:-CHANGEME}
      - RCON_PASSWORD=${RCON_PASSWORD:-changeme}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}

      # ===== [Server] Identity =====
      - SERVER_NAME=${SERVER_NAME:-pzserver}
      - SERVER_PUBLIC=${SERVER_PUBLIC:-true}
      - MAX_PLAYERS=${MAX_PLAYERS:-32}

      # ===== [Mod] Workshop =====
      - MODS=${MODS:-}
      - WORKSHOP_ITEMS=${WORKSHOP_ITEMS:-}

      # ===== [Mod] PanelBridge =====
      - PANEL_BRIDGE_ENABLED=${PANEL_BRIDGE_ENABLED:-false}
      - PANEL_BRIDGE_VERSION=${PANEL_BRIDGE_VERSION:-v1.0.26}
      - PANEL_BRIDGE_SOURCE_URL=${PANEL_BRIDGE_SOURCE_URL:-}
      - PANEL_BRIDGE_SHA256=${PANEL_BRIDGE_SHA256:-}

      # ===== [ARM] Extras =====
      - BRANCH=${BRANCH:-}
      - UPDATE_ON_START=${UPDATE_ON_START:-true}
      - BACKUPS_ON_START=${BACKUPS_ON_START:-true}

      # =========================================================================
      # All server settings have sensible defaults in the container.
      # To customize any setting (PVP, ports, Box64, mods, etc.), add it here
      # or use docker run -e VAR=value.
      # Full reference: docs/env-variables.md
      # =========================================================================
    ports:
      # Game traffic
      - "8766:8766/udp"
      - "8767:8767/udp"
      # Steam query / master server
      - "16261:16261/udp"
      - "16262:16262/udp"
      # RCON
      - "${RCON_BIND:-127.0.0.1}:${RCON_PORT:-27015}:${RCON_PORT:-27015}/tcp"
    volumes:
      # Server saves, mods, logs
      - pz-data:/project-zomboid
      # Server config (ProjectZomboid64.json, server INIs)
      - pz-config:/project-zomboid-config
      # SteamCMD cache (optional — speeds up repeated builds)
      - pz-steamapps:/steamapps
    stop_grace_period: 90s

  zomboid-panel:
    profiles: ["zomboid-panel"]
    build:
      context: ${PANEL_SOURCE_URL:-https://github.com/fpsacha/zomboid-control-panel.git#v1.0.26}
    container_name: zomboid-panel
    restart: unless-stopped
    depends_on:
      - pz-arm64
    ports:
      - "${PANEL_BIND:-127.0.0.1}:${PANEL_PORT:-3001}:3001/tcp"
    volumes:
      - panel-data:/app/data
      - panel-logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3001
      # RCON is reachable inside the Compose network as pz-arm64:${RCON_PORT:-27015}.
      # Configure that target in the panel UI during first setup.

volumes:
  pz-data:
    driver: local
  pz-config:
    driver: local
  pz-steamapps:
    driver: local
  panel-data:
    driver: local
  panel-logs:
    driver: local
